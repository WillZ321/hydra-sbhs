name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hydra-sbhs-main/Hydra/package-lock.json

      - name: Install dependencies
        working-directory: hydra-sbhs-main/Hydra
        run: npm ci

      - name: Build
        working-directory: hydra-sbhs-main/Hydra
        env:
          VITE_BASE_PATH: /hydra-sbhs/
          VITE_SBHS_CLIENT_ID: ${{ secrets.VITE_SBHS_CLIENT_ID }}
        run: |
          echo "Client ID length: ${#VITE_SBHS_CLIENT_ID}"
          npx tsc -b
          npx vite build --mode production
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hydra-sbhs-main/Hydra/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
